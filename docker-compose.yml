version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-factory-db
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipassword
      POSTGRES_DB: ai_factory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiuser -d ai_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-factory-backend
    environment:
      DATABASE_URL: postgres://aiuser:aipassword@postgres:5432/ai_factory
      JOB_ENDPOINT: 172.104.203.171
      LLM_MODEL: gemma4:e2b
    ports:
      - "4000:4000"
    volumes:
      - ./projects:/app/projects
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
