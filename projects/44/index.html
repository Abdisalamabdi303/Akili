<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet's Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to-tr, #ff9a9e, #fad0c4);
            font-family: 'Courier New', Courier, monospace;
        }
        .retro-text {
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-pink-300 via-purple-300 to-indigo-300 flex items-center justify-center h-screen">
    <div class="text-center p-8 rounded-lg shadow-lg backdrop-blur-lg bg-white/10 border border-white/20">
        <h1 class="retro-text mb-4">Welcome to Ahmet's Portfolio</h1>
        <p class="mb-6">Hi there! I'm Ahmet, and this is my little corner of the internet.</p>
        <div class="flex flex-col items-center space-y-4">
            <button class="bg-white/20 text-white rounded-lg px-4 py-2 hover:bg-white/30 active:bg-white/10 transition-all duration-300">Projects</button>
            <button class="bg-white/20 text-white rounded-lg px-4 py-2 hover:bg-white/30 active:bg-white/10 transition-all duration-300">Games</button>
            <button class="bg-white/20 text-white rounded-lg px-4 py-2 hover:bg-white/30 active:bg-white/10 transition-all duration-300">Contact</button>
        </div>
    </div>
</body>
</html>
