<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Store Landing Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div id="app" class="max-w-4xl p-8 rounded-lg shadow-lg bg-gray-800">
    <h1 class="text-4xl font-bold mb-6">Welcome to Our Pet Store</h1>
    <p class="text-xl mb-8">Find the perfect pet for you and your family.</p>
    <div class="flex items-center justify-between mb-8">
      <input type="text" id="search" placeholder="Search pets..." class="w-full p-4 rounded-lg bg-gray-700 text-white focus:outline-none focus:bg-gray-600">
      <button id="searchBtn" class="px-4 py-2 ml-4 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Search</button>
    </div>
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
      <!-- Product items will be dynamically generated by JavaScript -->
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
