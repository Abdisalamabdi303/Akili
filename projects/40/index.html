<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Store Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <header class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <img src="logo.png" alt="Pet Store Logo" class="h-12">
            <nav>
                <ul class="flex space-x-4">
                    <li><a href="#" class="text-gray-600 hover:text-gray-800">Home</a></li>
                    <li><a href="#" class="text-gray-600 hover:text-gray-800">Products</a></li>
                    <li><a href="#" class="text-gray-600 hover:text-gray-800">About Us</a></li>
                    <li><a href="#" class="text-gray-600 hover:text-gray-800">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto py-12">
        <section class="flex flex-col items-center justify-center space-y-4">
            <h1 class="text-3xl font-bold">Welcome to Our Pet Store</h1>
            <p class="text-lg text-gray-600">Find the best quality pet products at your fingertips.</p>
            <button class="bg-blue-500 hover:bg-blue-700 text-white py-2 px-4 rounded">Shop Now</button>
        </section>

        <section class="flex flex-wrap justify-center space-y-8 mt-12">
            <div class="w-full md:w-1/3 p-4">
                <img src="product1.jpg" alt="Product 1" class="w-full h-auto rounded-lg shadow-md mb-4">
                <h2 class="text-xl font-bold">Product 1</h2>
                <p class="text-gray-600">Description of Product 1.</p>
            </div>
            <div class="w-full md:w-1/3 p-4">
                <img src="product2.jpg" alt="Product 2" class="w-full h-auto rounded-lg shadow-md mb-4">
                <h2 class="text-xl font-bold">Product 2</h2>
                <p class="text-gray-600">Description of Product 2.</p>
            </div>
            <div class="w-full md:w-1/3 p-4">
                <img src="product3.jpg" alt="Product 3" class="w-full h-auto rounded-lg shadow-md mb-4">
                <h2 class="text-xl font-bold">Product 3</h2>
                <p class="text-gray-600">Description of Product 3.</p>
            </div>
        </section>
    </main>

    <footer class="bg-white text-center py-4 mt-12">
        <p>&copy; 2023 Pet Store. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
